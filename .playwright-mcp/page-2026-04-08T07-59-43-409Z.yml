    - textbox [active] [ref=e45]: "# markdown.mbt Playground A high-performance Markdown parser written in [MoonBit](https://www.moonbitlang.com/), compiled to WebAssembly. ## Features - **Blazing Fast**: MoonBit compiles to efficient WASM for near-native performance - **Syntax Highlighting**: Integrated code highlighting powered by Lezer - **Live Preview**: Real-time Markdown rendering as you type - **Auto Save**: Your content is automatically saved to browser storage (IndexedDB) ## Code Example ```typescript // Syntax highlighting works for multiple languages function greet(name: string): string { return `Hello, ${name}!`; } ``` ```rust fn main() { println!(\"Hello from Rust!\"); } ``` ## Markdown Support - **Bold** and *italic* text - [Links](https://github.com/mizchi/markdown.mbt) - `inline code` - > Blockquotes ## SVG Preview Edit the SVG below and see live preview: ```svg <svg width=\"200\" height=\"100\" xmlns=\"http://www.w3.org/2000/svg\"> <rect x=\"10\" y=\"10\" width=\"80\" height=\"80\" fill=\"#4a90d9\" rx=\"8\"/> <circle cx=\"150\" cy=\"50\" r=\"40\" fill=\"#e74c3c\"/> <text x=\"100\" y=\"95\" text-anchor=\"middle\" fill=\"#333\" font-size=\"12\">Edit me!</text> </svg> ``` ## Moonlight SVG Editor Interactive SVG editing with [Moonlight](https://github.com/mizchi/moonlight): ```moonlight-svg <svg viewBox=\"0 0 400 300\" xmlns=\"http://www.w3.org/2000/svg\"> <rect x=\"50\" y=\"50\" width=\"120\" height=\"80\" fill=\"#3498db\" rx=\"10\"/> <circle cx=\"280\" cy=\"90\" r=\"50\" fill=\"#e74c3c\"/> <polygon points=\"200,200 150,280 250,280\" fill=\"#2ecc71\"/> </svg> ``` ## Interactive Task List Click the checkboxes below - they update the source in real-time! - [ ] Try clicking this checkbox - [x] This one is already checked - [ ] Interactive editing from preview --- Source: [github.com/mizchi/markdown.mbt](https://github.com/mizchi/markdown.mbt)"